name: Auto-Lock Images

on:
  pull_request:
    types: [opened, synchronize]
    branches: ["**"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to analyze and lock"
        required: false
        default: ""

permissions:
  statuses: write

jobs:
  auto-lock:
    uses: crazyrokr/gha-workflows/.github/workflows/ha-addon-digest-lock.yaml@master
    secrets: inherit
    permissions:
      contents: write
    with:
      branch: ${{ github.event.inputs.branch }}

